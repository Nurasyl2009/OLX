<!DOCTYPE html>
<html lang="kk">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Тіркелу - Қолданылған заттарды сату</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <header>
    <div class="container header-container">
      <div class="logo">Nur<span>asyl</span>.</div>
      <nav>
        <ul class="nav-links">
          <li><a href="index.html">Басты бет</a></li>
          <li><a href="about.html">Біз туралы</a></li>
          <li><a href="blog.html">Блог</a></li>
          <li><a href="contact.html">Байланыс</a></li>
        </ul>
      </nav>
      <div class="auth-box" id="auth-box">
        <a href="login.html" class="btn btn-sm">Кіру</a>
        <a href="register.html" class="btn btn-sm active">Тіркелу</a>
      </div>
    </div>
  </header>

  <main>
    <section class="auth-section">
      <div class="container auth-container">
        <h2>7-тапсырма: Тіркелу (Register)</h2>
        <form id="register-form" class="auth-form">
          <div class="form-group">
            <label for="reg-name">Аты</label>
            <input type="text" id="reg-name" placeholder="Атыңызды енгізіңіз">
          </div>
          <div class="form-group">
            <label for="reg-email">Email</label>
            <input type="email" id="reg-email" placeholder="Email енгізіңіз">
          </div>
          <div class="form-group">
            <label for="reg-password">Құпиясөз</label>
            <input type="password" id="reg-password" placeholder="Құпиясөз (кемінде 6 символ)">
          </div>
          <p id="reg-error" class="error-msg"></p>
          <button type="submit" class="btn btn-block">Тіркелу</button>
        </form>
        <p class="auth-switch">Аккаунтыңыз бар ма? <a href="login.html">Кіру</a></p>
      </div>
    </section>
  </main>

  <footer>
    <div class="container footer-container">
      <p>&copy; 2026 Қолданылған заттарды сату платформасы. Авторы: Kabdykadirov Nurasyl.</p>
    </div>
  </footer>

  <script src="js/script.js"></script>
</body>

</html>
